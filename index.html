<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pleasant Hill Education Commission — Community Calendar</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f4f8; color: #333; }
  .header { background: linear-gradient(135deg, #1a5276, #2980b9); color: white; padding: 24px 20px; text-align: center; }
  .header h1 { font-size: 24px; margin-bottom: 4px; }
  .header p { font-size: 14px; opacity: 0.85; }
  .header .badge { display: inline-block; background: rgba(255,255,255,0.2); padding: 4px 12px; border-radius: 20px; font-size: 12px; margin-top: 8px; }
  .container { max-width: 800px; margin: 0 auto; padding: 16px; }
  .legend { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin: 16px 0; font-size: 13px; }
  .legend span { padding: 3px 10px; border-radius: 12px; font-weight: 500; }
  .tag-meeting { background: #d4efdf; color: #1e8449; }
  .tag-community { background: #d6eaf8; color: #2471a3; }
  .tag-art { background: #fdebd0; color: #b9770e; }
  .month-group { margin-bottom: 24px; }
  .month-label { font-size: 18px; font-weight: 700; color: #1a5276; padding: 8px 0; border-bottom: 2px solid #2980b9; margin-bottom: 12px; }
  .event-card { background: white; border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); display: flex; gap: 14px; align-items: flex-start; }
  .event-card:hover { transform: translateY(-1px); box-shadow: 0 2px 8px rgba(0,0,0,0.12); }
  .event-date { min-width: 60px; text-align: center; }
  .event-date .day { font-size: 20px; font-weight: 700; color: #1a5276; }
  .event-date .month-abbr { font-size: 11px; color: #777; text-transform: uppercase; }
  .event-details { flex: 1; }
  .event-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .event-meta { font-size: 13px; color: #666; }
  .event-tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-top: 4px; }
  .border-meeting { border-left: 4px solid #27ae60; }
  .border-community { border-left: 4px solid #2980b9; }
  .border-art { border-left: 4px solid #e67e22; }
  .loading { text-align: center; padding: 40px; color: #999; }
  .error { text-align: center; padding: 40px; color: #e74c3c; }
  footer { text-align: center; padding: 20px; color: #999; font-size: 12px; }
  footer a { color: #2980b9; }
  @media (max-width: 600px) { .header h1 { font-size: 20px; } .event-date { min-width: 50px; } }
</style>
</head>
<body>
<div class="header">
  <h1>🎓 Pleasant Hill Education Commission</h1>
  <p>Community Calendar 2026</p>
  <div class="badge">Live — updates automatically</div>
</div>
<div class="container">
  <div class="legend">
    <span class="tag-meeting">EC Meetings</span>
    <span class="tag-community">Community Events</span>
    <span class="tag-art">Art Displays</span>
  </div>
  <div id="calendar"><div class="loading">Loading calendar...</div></div>
</div>
<footer>Pleasant Hill Education Commission · City of Pleasant Hill</footer>
<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbwGT8MVjKpfln1EB7F5DsA5b6TgiAz3DUD6DPfxVn2Ea5IH2UW9LJTGDH3w_kl7QT88Ng/exec';

function categorize(event) {
  if (/commission meeting/i.test(event)) return 'meeting';
  if (/art display|🎨/i.test(event)) return 'art';
  return 'community';
}

function parseDate(dateStr) {
  if (!dateStr) return { month: -1, day: 0 };
  const d = new Date(dateStr);
  if (!isNaN(d)) return { month: d.getMonth(), day: d.getDate() };
  const months = {jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11,
    january:0,february:1,march:2,april:3,june:5,july:6,august:7,september:8,october:9,november:10,december:11};
  const m = dateStr.match(/(\w+)\s+(\d{1,2})/);
  if (m && months[m[1].toLowerCase()] !== undefined) return { month: months[m[1].toLowerCase()], day: parseInt(m[2]) };
  return { month: -1, day: 0 };
}

async function loadCalendar() {
  try {
    const resp = await fetch(API_URL);
    const data = await resp.json();
    const events = data.events.map(e => ({
      ...e, category: categorize(e.event), parsed: parseDate(e.date)
    }));
    
    const monthOrder = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const grouped = {};
    events.forEach(e => { const mo = e.month || 'Other'; if (!grouped[mo]) grouped[mo] = []; grouped[mo].push(e); });
    
    let html = '';
    for (const month of monthOrder) {
      if (!grouped[month]) continue;
      html += '<div class="month-group"><div class="month-label">' + month + '</div>';
      for (const e of grouped[month]) {
        const p = e.parsed;
        const day = p.day > 0 ? p.day : '';
        const abbr = month.substring(0, 3);
        const label = e.category === 'meeting' ? 'EC Meeting' : e.category === 'art' ? 'Art Display' : 'Community';
        html += '<div class="event-card border-' + e.category + '">' +
          '<div class="event-date"><div class="day">' + day + '</div><div class="month-abbr">' + abbr + '</div></div>' +
          '<div class="event-details"><div class="event-title">' + e.event + '</div>' +
          (e.notes ? '<div class="event-meta">' + e.notes + '</div>' : '') +
          '<span class="event-tag tag-' + e.category + '">' + label + '</span></div></div>';
      }
      html += '</div>';
    }
    document.getElementById('calendar').innerHTML = html;
  } catch (err) {
    document.getElementById('calendar').innerHTML = '<div class="error">Failed to load calendar. Please try again later.</div>';
  }
}
loadCalendar();
setInterval(loadCalendar, 300000);
</script>
</body>
</html>
